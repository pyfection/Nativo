# fly.toml app configuration file generated for nativo-api on 2026-06-11T11:55:18-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'nativo-api'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  release_command = 'alembic -c /app/backend/alembic.ini upgrade head'

[env]
  PORT = '8000'
  UPLOADS_DIR = '/data/uploads'

# Persistent volume so user-uploaded audio survives machine restarts.
# Create with:  fly volumes create nativo_uploads --size 3 --region iad
[mounts]
  source = 'nativo_uploads'
  destination = '/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 100
    soft_limit = 50

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
