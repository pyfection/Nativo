services:
  db:
    image: postgres:16-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-nativo}_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nativo}
      POSTGRES_USER: ${POSTGRES_USER:-nativo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nativo}
    volumes:
    - postgres_data:/var/lib/postgresql/data
    ports:
    - 5433:5432
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U ${POSTGRES_USER:-nativo}
      interval: 10s
      timeout: 5s
      retries: 5
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: ${COMPOSE_PROJECT_NAME:-nativo}_backend
    volumes:
    - ./backend:/app/backend
    - ./pyproject.toml:/app/pyproject.toml
    - backend-uploads:/app/backend/uploads
    - /app/.venv
    ports:
    - 8010:8000
    environment:
    - DEBUG=1
    - DATABASE_URL=postgresql://${POSTGRES_USER:-nativo}:${POSTGRES_PASSWORD:-nativo}@db:5432/${POSTGRES_DB:-nativo}
    - SECRET_KEY=${SECRET_KEY:-change-me-in-production-min-32-chars-long}
    depends_on:
      db:
        condition: service_healthy
    entrypoint: "sh -c \"\n  echo 'Waiting for database to be ready...'\n  sleep 5\n  echo 'Running migrations...'\n  cd /app/backend\n  uv run alembic upgrade head || echo 'Migrations skipped or failed'\n  echo 'Seeding database...'\n  uv run python seed_dev_postgres_db.py || echo 'Seed script skipped or failed'\n  echo 'Starting server...'\n  exec uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload\n\"\n"
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: ${COMPOSE_PROJECT_NAME:-nativo}_frontend
    command: npm run dev -- --host
    volumes:
    - ./frontend:/app/frontend
    - /app/frontend/node_modules
    ports:
    - 3010:5173
    environment:
    - VITE_API_BASE_URL=http://localhost:8003
    - CHOKIDAR_USEPOLLING=true
    depends_on:
    - backend
volumes:
  postgres_data: null
  backend-uploads: null
